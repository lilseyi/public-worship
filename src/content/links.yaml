# =====================================================================
# IMPORTANT LINKS — homepage Links section
# =====================================================================
# How to add a link:
#   1. Drop the thumbnail image into /public/links/ (any image format).
#   2. Add a new block below — copy/paste an existing one and edit the
#      five fields. The id should be a short slug, unique across links.
#   3. Reorder by moving the block up or down.
#   4. Commit. The site rebuilds automatically (~30s).
#
# Required fields: id, title, url, thumbnail
# Optional fields: subtitle, cta (button label, default "Open"),
#                  featured (true|false, makes the card larger)
# =====================================================================

- id: givebutter
  title: Donate
  subtitle: "(Card, Apple Pay, Venmo, ACH)"
  url: https://givebutter.com/publicworship
  thumbnail: /links/givebutter.svg
  cta: Give now
  featured: false

- id: zelle
  title: Donate Through Zelle
  subtitle: give@publicworship.life
  url: mailto:give@publicworship.life
  thumbnail: /links/zelle.svg
  cta: "(Click to Copy)"
  featured: false
