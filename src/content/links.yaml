# =====================================================================
# IMPORTANT LINKS — homepage Links section
# =====================================================================
# How to add a link:
#   1. Drop the thumbnail/photo into /public/links/ (any format).
#   2. Add a new block below — copy/paste an existing one and edit the
#      fields. The id should be a short slug, unique across links.
#   3. Reorder by moving the block up or down.
#   4. Commit. The site rebuilds automatically (~30s).
#
# Required: id, title, url
# Optional: subtitle, thumbnail (small logo above text), bgImage
#           (full-bleed photo background — used for poster cards),
#           cta (a small line under subtitle), align ("center" | "topLeft"),
#           featured (true | false)
# =====================================================================

- id: eden
