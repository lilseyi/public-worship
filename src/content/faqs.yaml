- id: how-to-get-involved
  question: How can I get involved?
  answer: |
    We welcome individuals who are passionate about worship and Jesus to
    join us! You can get involved by volunteering your time, donating to
    support our programs, or keeping track with our events and amplifying
    them on your social media pages.

    [Fill out this form](https://forms.gle/) if you are interested in
    volunteering your time.

- id: how-donations-used
  question: How are donations used?
  answer: |
    Your donations play a crucial role in supporting our mission. They
    are used to fund our various projects we execute on to reach people
    through worship. This includes things such as purchasing equipment,
    transportation, and food for volunteers.

- id: church-affiliation
  question: Are you a part of a church?
  answer: |
    We're not affiliated with any specific church, denomination, or
    political group. We're a nonprofit that is rooted in Biblical
    Christianity. However many of our founding members are active church
    leaders in FOUNT NYC. If you want to learn more, visit
    [www.fount.nyc](https://fount.nyc).
