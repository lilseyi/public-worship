- id: how-to-help
  question: How do I get involved?
  answer: |
    There are three main ways to plug in. Fill out our [volunteer
    interest form](https://forms.gle/) so we know your gifts and how to
    reach you when the right need arises. Donate — every gift helps us
    fund equipment, travel, and food for the team. Or just amplify what
    we're doing on social by sharing our posts and inviting friends.

- id: where-money-goes
  question: How does my donation get used?
  answer: |
    Donations cover the real costs of putting on a worship event:
    equipment (mics, speakers, cameras), transportation to and from
    venues, food for our volunteer team, and the editing software and
    storage we need to publish content afterward.

- id: church-affiliation
  question: Is Public Worship affiliated with a specific church?
  answer: |
    No. We are not affiliated with any specific church, denomination,
    or political group. We are a nonprofit rooted in Biblical
    Christianity. Several of our founding members are active in
    [FOUNT NYC](https://fount.nyc), but Public Worship itself is
    independent.
