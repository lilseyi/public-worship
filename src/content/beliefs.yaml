# =====================================================================
# Statement of Beliefs — /beliefs page
# =====================================================================

- id: trinity
  body: "There is one God: God the Father, God the Son, and God the Holy Spirit."

- id: deity-of-christ
  body: >-
    In the deity of our Lord Jesus Christ the Son of God; we believe in His
    virgin birth, in His sinless life, in His miracles, in His victorious and
    atoning death, in His bodily resurrection, in His ascension to the right
    hand of the Father, His constant intercession and in His imminent return.

- id: holy-spirit
  body: >-
    In the person and work of the Holy Spirit with His fruits and gifts
    available in the Church.

- id: scripture
  body: >-
    The Bible is the living word of God. It is infallible, authoritative and
    everlasting and is the foundation of all Christian doctrine.

- id: devil
  body: In the existence of an evil spiritual being known as the devil.

- id: salvation
  body: >-
    In the spiritually lost condition of all people and the essential need for
    the new birth by faith in Jesus Christ.

- id: spirit-baptism
  body: >-
    In the baptism of the Holy Spirit as a gift available to all believers.

- id: sacraments
  body: >-
    In the sacraments of the Lord's Supper and baptism by full immersion in
    water for all believers.

- id: resurrection
  body: >-
    In the resurrection of both the saved and the lost, the one to everlasting
    life and the other to everlasting separation from God.

- id: church
  body: >-
    In the church being the body of Christ, and each member being an active
    part of a local church, fulfilling the Great Commission.

- id: marriage
  body: >-
    Marriage was instituted by God, ratified by Jesus, and is exclusively
    between a man and a woman. It is a picture of Christ and his church.

- id: sex
  body: >-
    Sex is a gift from God for procreation and unity, and it is only
    appropriate within and designed for marriage.
